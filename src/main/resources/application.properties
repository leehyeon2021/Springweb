# 2-2. 연동할 db 서버의 계정/비밀번호 . 띄어쓰기도 비밀번호에 포함되니 주의하기.
spring.datasource.username=root
spring.datasource.password=1234
#     - DAO에서 했던 db 연동을 여기서 함. 알아서 연동 해줌!

# 2-3. Entity 테이블 생성 (여기서 AppStart 실행할 때마다 테이블 생성 자동으로 해줌!)  (DDL: sql 정의어)
   # - `create`: 서버가 실행할 때마다 삭제 후 생성. ( 실무에선 잘 사용하지 않음 )
spring.jpa.hibernate.ddl-auto = create
   # - `update`: 서버 실행할 때마다 존재하면 수정, 존재하지 않으면 생성. ( 실무에선 update나 none을 사용. )
#spring.jpa.hibernate.ddl-auto = update
   # - `none`: 사용 안 함
#spring.jpa.hibernate.ddl-auto = none

# 2-4. 콘솔창에 실행된 sql 표시 (없어도 되긴 함)
# **개발 단계에서 확인용으로 사용: 디버깅(확인용).** **운영/배포 단계에서는 사용할 필요 없다.**
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.format_sql = true
# SQL 내 매개변수 값들을 표시 - day008 **운영/배포 시 모니터링(유지보수)에 사용하는 경우도 있다.**
logging.level.org.hibernate.jdbc.bind = TRACE
logging.level.org.hibernate.sql = DEBUG

# ====== 0311 day008 , day017의 springweb ========
# 2-5. 서버 실행할 때 SQL 파일(data.sql) 실행. always, none 있음.
# **개발 단계에서만 사용: 계속 새로 만들기 때문.** **운영/배포 단계에서는 사용하지 않는다.** -- example할 때는 이거 끄기
spring.sql.init.mode = always
#spring-sql.init.mode = none
# 2-6. 서버 실행할 때 classpath(resources폴더) 이하에 data.sql 파일 경로 지정
spring.sql.init.data-locations=classpath:/sql/data.sql
# 2-7. 서버 실행할 때 JPA가 초기화 파일 실행.
spring.jpa.defer-datasource-initialization = true

# ======= 0325 day016 ========
# 3. 업로드 파일 최대 용량 제한 설정 , 기본값이 1MB = 1024byte
# 3-1. 파일 마다의 용량 제한
spring.servlet.multipart.max-file-size = 10MB
# 3-2. 한 번 요청에 여러 개 파일을 (한 번에) 전송했을 때 최대 용량
spring.servlet.multipart.max-request-size = 100MB