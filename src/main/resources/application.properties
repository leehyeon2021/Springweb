# application.properties - 이름 기억해두기!
# 이 파일은 항상 resource 폴더 바로 아래 만든다.
# 목적: 스프링 서버가 실행될 때 설정을 로딩하는 파일이다.
# 주석은 #을 이용한다.
# 참고: properties 파일 인코딩이 깨질 때는 - 설정 -> '인코딩' 검색 -> 파일 인코딩 메뉴 클릭 -> 프로퍼티 파일에 대한 디폴트 인코딩을 UTF-8로 설정.

# 1. 내장 AWS PORT 번호 변경 여기서 가능. 기본값은 8080이며 수정 가능.
server.port = 8080

# 2. DAO가 아닌 프로퍼티 파일에서 DB연동 가능하다. JDBC
#   1. 연동할 db 서버의 주소
#spring.datasource.url=jdbc:mysql://localhost:3306/mydb0303
#spring.datasource.url=jdbc:mysql://localhost:3306/mydb0304 - day005의 mvc.
spring.datasource.url=jdbc:mysql://localhost:3306/practice5
#   2. 연동할 db 서버의 계정/비밀번호 . 띄어쓰기도 비밀번호에 포함되니 주의하기.
spring.datasource.username=root
spring.datasource.password=1234
#     - DAO에서 했던 db 연동을 여기서 함. 알아서 연동 해줌!